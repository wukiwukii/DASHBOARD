<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리틀그라운드 통합 MD 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* v_27.html의 원본 스타일 100% 보존 */
        :root { --bg-color: #0d0d0d; --card-bg: #1a1a1a; --text-color: #e0e0e0; --accent-color: #00e676; --grid-color: #333; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Pretendard', -apple-system, sans-serif; margin: 0; padding: 20px; line-height: 1.6; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--grid-color); padding-bottom: 20px; }
        .header h1 { margin: 0; font-size: 24px; letter-spacing: 2px; }
        .header h1 span { color: var(--accent-color); font-size: 14px; margin-left: 10px; font-weight: normal; }
        .upload-btn { background: var(--accent-color); color: #000; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-weight: 700; transition: 0.2s; border: none; }
        .upload-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .chart-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); padding: 24px; border-radius: 12px; border: 1px solid var(--grid-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card h3 { margin-top: 0; margin-bottom: 20px; font-size: 16px; color: #888; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th { color: #555; font-weight: 600; padding: 12px; border-bottom: 2px solid var(--grid-color); text-align: center; }
        td { padding: 12px; border-bottom: 1px solid var(--grid-color); text-align: right; }
        .brand-col { text-align: left; color: var(--accent-color); font-weight: bold; }
        #sales-table tbody tr:hover { background: rgba(0,230,118,0.05); }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header">
        <h1>LITTLEGROUND <span>CORPORATE HQ SALES MD</span></h1>
        <label for="file-upload" class="upload-btn">EXCEL UPLOAD</label>
        <input type="file" id="file-upload" hidden accept=".xlsx, .xls">
    </div>

    <div class="chart-grid">
        <div class="card">
            <h3>브랜드별 매출 비중 (원본 데이터)</h3>
            <div style="height: 350px;"><canvas id="brandChart"></canvas></div>
        </div>
        <div class="card">
            <h3>점포별 실적 추이</h3>
            <div style="height: 350px;"><canvas id="storeChart"></canvas></div>
        </div>
    </div>

    <div class="card">
        <h3>세부 판매 내역</h3>
        <table id="sales-table">
            <thead>
                <tr>
                    <th style="text-align: left;">브랜드</th>
                    <th>매장명</th>
                    <th>판매금액 (1원 단위)</th>
                    <th>판매일자</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script>
    let bChart = null;
    let sChart = null;

    // [기능 1] 페이지 접속 시 DB에서 데이터 가져오기
    window.onload = async () => {
        try {
            const res = await fetch('/api/data');
            const savedData = await res.json();
            if (savedData && savedData.length > 0) {
                // DB 데이터를 v_27 원본 형식에 맞춰 렌더링
                renderDashboard(savedData);
            }
        } catch (err) { console.error("Data Load Error:", err); }
    };

    // [기능 2] 엑셀 업로드 시 DB 저장 로직 (v_27 로직 보존)
    document.getElementById('file-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = async function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(sheet);

            // [절사 없음] 엑셀의 원본 amount를 그대로 가져와서 서버로 전송
            const itemsToSave = jsonData.map(row => ({
                brand: row['브랜드'] || row['brand'],
                store: row['매장'] || row['store'],
                amount: Number(row['금액'] || row['amount']), // 1원 단위 보존
                date: String(row['날짜'] || row['date'])
            }));

            const saveRes = await fetch('/api/data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: itemsToSave })
            });

            if (saveRes.ok) {
                alert("서버와 동기화되었습니다.");
                location.reload();
            }
        };
        reader.readAsArrayBuffer(file);
    });

    // [기능 3] v_27.html 원본 시각화 로직 그대로 사용
    function renderDashboard(data) {
        const tbody = document.querySelector('#sales-table tbody');
        tbody.innerHTML = '';
        
        const bData = {};
        const sData = {};

        data.forEach(item => {
            // 테이블 렌더링
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="brand-col">${item.brand_name}</td>
                <td style="text-align:center">${item.store_name}</td>
                <td>${item.amount.toLocaleString()}원</td>
                <td style="text-align:center">${item.sale_date}</td>
            `;
            tbody.appendChild(tr);

            // 차트 데이터 집계
            const bName = item.brand_name || '기타';
            const sName = item.store_name || '기타';
            bData[bName] = (bData[bName] || 0) + item.amount;
            sData[sName] = (sData[sName] || 0) + item.amount;
        });

        updateCharts(bData, sData);
    }

    function updateCharts(bData, sData) {
        const chartOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#888', font: { size: 11 } } } },
            scales: {
                y: { grid: { color: '#222' }, ticks: { color: '#555' } },
                x: { grid: { display: false }, ticks: { color: '#555' } }
            }
        };

        if (bChart) bChart.destroy();
        bChart = new Chart(document.getElementById('brandChart'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(bData),
                datasets: [{
                    data: Object.values(bData),
                    backgroundColor: ['#00e676', '#00b0ff', '#ff5252', '#ffd740', '#e040fb'],
                    borderWidth: 0
                }]
            },
            options: { ...chartOptions, cutout: '70%' }
        });

        if (sChart) sChart.destroy();
        sChart = new Chart(document.getElementById('storeChart'), {
            type: 'bar',
            data: {
                labels: Object.keys(sData),
                datasets: [{
                    label: '점포별 매출액',
                    data: Object.values(sData),
                    backgroundColor: 'rgba(0, 230, 118, 0.2)',
                    borderColor: '#00e676',
                    borderWidth: 2
                }]
            },
            options: chartOptions
        });
    }
</script>

</body>
</html>
