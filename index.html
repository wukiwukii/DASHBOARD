      cY.forEach(r=>{if(r.b && r.b!=='미분류') bRankMap.set(r.b,(bRankMap.get(r.b)||0)+r.s);});
      const sortedAB=[...abBrands].sort((a,b)=>(bRankMap.get(b)||0)-(bRankMap.get(a)||0));

      if(!state.brandAnalysisBrand || !abBrands.has(state.brandAnalysisBrand)) {
        state.brandAnalysisBrand = sortedAB[0] || '';
      }
      const selB = state.brandAnalysisBrand;

      // === 1단계: 브랜드 목록 수집 및 버튼 생성 ===
      const allBrands = new Set();
      cY.forEach(function(r) { if(r.b && r.b !== '미분류') allBrands.add(r.b); });
      pY.forEach(function(r) { if(r.b && r.b !== '미분류') allBrands.add(r.b); });
      // prefixMap 제외 - 실제 판매 데이터만 표시
      
      const brandRankMap = new Map();
      cY.forEach(function(r) {
        if(r.b && r.b !== '미분류') {
          brandRankMap.set(r.b, (brandRankMap.get(r.b) || 0) + r.s);
        }
      });
      
      const sortedBrands = Array.from(allBrands).sort(function(a, b) {
        return (brandRankMap.get(b) || 0) - (brandRankMap.get(a) || 0);
      });

      if(!state.brandAnalysisBrand || !allBrands.has(state.brandAnalysisBrand)) {
        state.brandAnalysisBrand = sortedBrands[0] || '';
      }

      window.selectAnalysisBrand = function(brand) { 
        state.brandAnalysisBrand = brand; 
        renderDashboard(); 
      };
      
      const brandOptions = sortedBrands.map(function(brand) {
        const isSelected = (brand === selB) ? 'selected' : '';
        return '<option value="' + brand + '" ' + isSelected + '>' + brand + '</option>';
      }).join('');
      const brandDropdown = '<select onchange="selectAnalysisBrand(this.value);" style="padding:8px 12px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid var(--border);background:white;cursor:pointer;min-width:200px;">' + brandOptions + '</select>';

      // === 2단계: 스타일별 당해/전년 집계 ===
      const styleMap = new Map();
      cY.forEach(function(r) {
        if(r.b !== selB) return;
        const styleName = String(r.sn || '').trim();
        if(!styleName) return;
        
        if(!styleMap.has(styleName)) {
          styleMap.set(styleName, {
            name: styleName,
            cur: 0,
            prev: 0,
            qty: 0,
            jung: '',
            styleCode: String(r.st || '').trim().toUpperCase()
          });
        }
        const item = styleMap.get(styleName);
        item.cur += r.s;
        item.qty += r.q;
      });

      pY.forEach(function(r) {
        if(r.b !== selB) return;
        const styleName = String(r.sn || '').trim();
        if(!styleName) return;
        
        if(!styleMap.has(styleName)) {
          styleMap.set(styleName, {
            name: styleName,
            cur: 0,
            prev: 0,
            qty: 0,
            jung: '',
            styleCode: String(r.st || '').trim().toUpperCase()
          });
        }
        styleMap.get(styleName).prev += r.s;
      });

      // === 3단계: 중분류 메타데이터 보강 ===
      styleMap.forEach(function(item) {
        const code = item.styleCode;
        const meta = state.prodMap.get('META:' + code.substring(0, 11)) || 
                     state.prodMap.get('META:' + code) || 
                     null;
        if(meta && meta.jung) {
          item.jung = meta.jung;
        }
      });

      // === 4단계: 중분류별 그룹화 ===
      const jungMap = new Map();
      styleMap.forEach(function(item) {
        const jungKey = item.jung || '(중분류 없음)';
        if(!jungMap.has(jungKey)) {
          jungMap.set(jungKey, { items: [], cur: 0, prev: 0 });
        }
        const jungGroup = jungMap.get(jungKey);
        jungGroup.items.push(item);
        jungGroup.cur += item.cur;
        jungGroup.prev += item.prev;
      });

      const sortedJung = Array.from(jungMap.entries()).sort(function(a, b) {
        return b[1].cur - a[1].cur;
      });

      // === 5단계: 선택된 중분류 확인 ===
      if(!state.selectedJung || !jungMap.has(state.selectedJung)) {
        state.selectedJung = sortedJung.length > 0 ? sortedJung[0][0] : '';
      }
      const selectedJungKey = state.selectedJung;

      // === 6단계: 브랜드 전체 KPI ===
      let brandTotalCur = 0;
      let brandTotalPrev = 0;
      sortedJung.forEach(function(entry) {
        brandTotalCur += entry[1].cur;
        brandTotalPrev += entry[1].prev;
      });
      const brandGap = brandTotalCur - brandTotalPrev;
      const brandGrowth = brandTotalPrev > 0 ? ((brandGap / brandTotalPrev) * 100).toFixed(1) : null;

      const brandKpiHtml = '<div style="display:flex;gap:0;padding:0;background:linear-gradient(135deg,rgba(124,58,237,0.1),#f5f7fa);border-radius:8px;margin-bottom:10px;border:1px solid #e0e7ff;overflow:hidden;">' +
        '<div style="padding:10px 20px;display:flex;flex-direction:column;gap:2px;"><span style="font-size:10px;color:#6b7280;font-weight:700;">당해 총매출</span><span style="font-size:20px;font-weight:800;color:#7c3aed;line-height:1.1;">' + renderAmt(brandTotalCur) + '</span></div>' +
        '<div style="width:1px;height:100%;background:#d1d5db;"></div>' +
        '<div style="padding:10px 20px;display:flex;flex-direction:column;gap:2px;"><span style="font-size:10px;color:#6b7280;font-weight:700;">전년 동기</span><span style="font-size:20px;font-weight:800;color:#4b5563;line-height:1.1;">' + renderAmt(brandTotalPrev) + '</span></div>' +
        '<div style="width:1px;height:100%;background:#d1d5db;"></div>' +
        '<div style="padding:10px 20px;display:flex;flex-direction:column;gap:2px;"><span style="font-size:10px;color:#6b7280;font-weight:700;">GAP</span><span style="font-size:20px;font-weight:800;line-height:1.1;" class="' + (brandGap >= 0 ? 'up' : 'dn') + '">' + (brandGap >= 0 ? '+' : '') + renderAmt(brandGap) + '</span></div>' +
        '<div style="width:1px;height:100%;background:#d1d5db;"></div>' +
        '<div style="padding:10px 20px;display:flex;flex-direction:column;gap:2px;"><span style="font-size:10px;color:#6b7280;font-weight:700;">신장율</span><span style="font-size:20px;font-weight:800;line-height:1.1;" class="' + (brandGrowth !== null ? (parseFloat(brandGrowth) >= 0 ? 'up' : 'dn') : '') + '">' + (brandGrowth !== null ? (parseFloat(brandGrowth) >= 0 ? '+' : '') + brandGrowth + '%' : '-') + '</span></div>' +
        '</div>';

      // === 7단계: 중분류 탭 버튼 생성 ===
      window.selectJungCategory = function(jungName) {
        state.selectedJung = jungName;
        renderDashboard();
      };

      const jungTabsHtml = sortedJung.map(function(entry) {
        const jungName = entry[0];
        const isActive = (jungName === selectedJungKey);
        const safeJung = jungName.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        return '<button onclick="selectJungCategory(\'' + safeJung + '\');" style="padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid ' + (isActive ? '#7c3aed' : '#d1d5db') + ';background:' + (isActive ? '#7c3aed' : 'white') + ';color:' + (isActive ? 'white' : '#4b5563') + ';">' + jungName + '</button>';
      }).join('');

      // === 8단계: 선택된 중분류 데이터 렌더링 ===
      const selectedJungData = jungMap.get(selectedJungKey);
      
      if(!selectedJungData) {
        content.innerHTML = mainTabHtml +
          '<div style="margin-bottom:14px;display:flex;align-items:center;gap:12px;"><label style="font-size:11px;font-weight:700;color:#6b7280;">브랜드 선택:</label>' + brandDropdown + '</div>' +
          brandKpiHtml +
          '<div style="padding:40px;text-align:center;color:#6b7280;">데이터가 없습니다.</div>';
      } else {
        const jungCur = selectedJungData.cur;
        const jungPrev = selectedJungData.prev;
        const jungGap = jungCur - jungPrev;
        const jungGrowth = jungPrev > 0 ? ((jungGap / jungPrev) * 100).toFixed(1) : null;

        const jungKpiHtml = '<div style="display:flex;gap:0;padding:0;background:linear-gradient(135deg,#faf5ff,#f3e8ff);border-radius:8px;margin-bottom:10px;border:1px solid #e9d5ff;overflow:hidden;">' +
          '<div style="padding:8px 16px;display:flex;flex-direction:column;gap:1px;"><span style="font-size:9px;color:#6b7280;font-weight:700;">' + selectedJungKey + ' 당해</span><span style="font-size:16px;font-weight:800;color:#7c3aed;line-height:1.1;">' + renderAmt(jungCur) + '</span></div>' +
          '<div style="width:1px;height:100%;background:#e9d5ff;"></div>' +
          '<div style="padding:8px 16px;display:flex;flex-direction:column;gap:1px;"><span style="font-size:9px;color:#6b7280;font-weight:700;">전년</span><span style="font-size:16px;font-weight:800;color:#4b5563;line-height:1.1;">' + renderAmt(jungPrev) + '</span></div>' +
          '<div style="width:1px;height:100%;background:#e9d5ff;"></div>' +
          '<div style="padding:8px 16px;display:flex;flex-direction:column;gap:1px;"><span style="font-size:9px;color:#6b7280;font-weight:700;">GAP</span><span style="font-size:16px;font-weight:800;line-height:1.1;" class="' + (jungGap >= 0 ? 'up' : 'dn') + '">' + (jungGap >= 0 ? '+' : '') + renderAmt(jungGap) + '</span></div>' +
          '<div style="width:1px;height:100%;background:#e9d5ff;"></div>' +
          '<div style="padding:8px 16px;display:flex;flex-direction:column;gap:1px;"><span style="font-size:9px;color:#6b7280;font-weight:700;">신장율</span><span style="font-size:16px;font-weight:800;line-height:1.1;" class="' + (jungGrowth !== null ? (parseFloat(jungGrowth) >= 0 ? 'up' : 'dn') : '') + '">' + (jungGrowth !== null ? (parseFloat(jungGrowth) >= 0 ? '+' : '') + jungGrowth + '%' : '-') + '</span></div>' +
          '</div>';

        // TOP 20 스타일
        const top20Items = selectedJungData.items.slice().sort(function(a, b) {
          return b.cur - a.cur;
        }).slice(0, 20);

        let tableRowsHtml = '';
        for(let i = 0; i < top20Items.length; i++) {
          const item = top20Items[i];
          const hasAnySale = item.cur > 0 || item.prev > 0;
          if(!hasAnySale) continue;

          const isNew = item.prev === 0 && item.cur > 0;
          const isDiscontinued = item.prev > 0 && item.cur === 0;
          const canCompare = item.cur > 0 && item.prev > 0;

          const gap = canCompare ? item.cur - item.prev : 0;
          const growth = canCompare ? ((gap / item.prev) * 100).toFixed(1) : '-';

          const rowBg = isDiscontinued ? 'background:#fff5f5;' : isNew ? 'background:#f0fdf4;' : '';
          const badge = isNew ? ' <span style="font-size:9px;background:#dcfce7;color:#16a34a;padding:2px 6px;border-radius:10px;margin-left:6px;font-weight:700;">NEW</span>' : (isDiscontinued ? ' <span style="font-size:9px;background:#fee2e2;color:#dc2626;padding:2px 6px;border-radius:10px;margin-left:6px;font-weight:700;">단종</span>' : '');

          tableRowsHtml += '<tr style="' + rowBg + '">' +
            '<td class="center" style="color:#6b7280;font-size:11px;">' + (i + 1) + '</td>' +
            '<td class="left" style="font-weight:700;font-size:12px;">' + (item.name || '-') + badge + '</td>' +
            '<td class="num" style="font-weight:800;color:' + (item.cur > 0 ? '#7c3aed' : '#6b7280') + ';">' + (item.cur > 0 ? renderAmt(item.cur) : '-') + '</td>' +
            '<td class="num" style="color:#6b7280;">' + (item.prev > 0 ? renderAmt(item.prev) : '-') + '</td>' +
            '<td class="num ' + (canCompare ? (gap >= 0 ? 'up' : 'dn') : '') + '" style="font-weight:' + (canCompare ? '700' : '400') + ';">' + (canCompare ? (gap >= 0 ? '+' : '') + renderAmt(gap) : '-') + '</td>' +
            '<td class="num ' + (canCompare && growth !== '-' ? (parseFloat(growth) >= 0 ? 'up' : 'dn') : '') + '">' + (canCompare ? (parseFloat(growth) >= 0 ? '+' : '') + growth + '%' : '-') + '</td>' +
            '<td class="num" style="color:#6b7280;">' + (item.qty > 0 ? item.qty.toLocaleString() + '개' : '-') + '</td>' +
            '</tr>';
        }

        if(tableRowsHtml === '') {
          tableRowsHtml = '<tr><td colspan="7" class="center" style="padding:30px;color:#6b7280;">데이터가 없습니다.</td></tr>';
        }

        content.innerHTML = mainTabHtml +
          '<div style="margin-bottom:14px;display:flex;align-items:center;gap:12px;"><label style="font-size:11px;font-weight:700;color:#6b7280;">브랜드 선택:</label>' + brandDropdown + '</div>' +
          brandKpiHtml +
          '<div style="margin-bottom:10px;"><div style="font-size:11px;font-weight:700;color:#6b7280;margin-bottom:8px;">중분류 선택</div><div style="display:flex;flex-wrap:wrap;gap:6px;">' + jungTabsHtml + '</div></div>' +
          jungKpiHtml +
          '<div class="card" style="padding:14px 18px;"><div class="sec-title">📊 ' + selectedJungKey + ' TOP 20</div><div class="excel-tbl-wrap" style="border:none;border-top:3px solid #7c3aed;"><table><thead><tr><th class="center" style="width:50px;">순위</th><th class="left">스타일명</th><th class="num">당해</th><th class="num">전년</th><th class="num">GAP</th><th class="num">신장율</th><th class="num">수량</th></tr></thead><tbody>' + tableRowsHtml + '</tbody></table></div></div>';
      }

      }

  } else if(state.tab==='brandsearch'){
    chartBox.style.display='block';
    document.getElementById('heroArea').style.display='none';
    const brands=new Set();
    state.d26.forEach(rows => rows.forEach(r => { if(r.b && r.b !== '미분류') brands.add(r.b); }));
    state.d25.forEach(rows => rows.forEach(r => { if(r.b && r.b !== '미분류') brands.add(r.b); }));
    // 상품정보 파일의 브랜드도 추가 (매출 없어도 존재하는 브랜드)
    state.prefixMap.forEach(v => { if(v && v !== '미분류') brands.add(v); });
    
    // 브랜드 검색 리스트 - 당해+전년 매출 합계 기준 정렬
    const bMapCur = new Map();  // 당해 매출
    const bMapPrev = new Map(); // 전년 매출
    const cRange = cYRange();
    const pRange = pYRange();
    
    // 당해 매출 집계
    state.d26.forEach(rows => rows.forEach(r => {
        if(r.txDate >= cRange.s && r.txDate <= cRange.e && r.b !== '미분류') {
           bMapCur.set(r.b, (bMapCur.get(r.b) || 0) + r.s);
        }
    }));
    
    // 전년 매출 집계
    state.d25.forEach(rows => rows.forEach(r => {
        if(r.txDate >= pRange.s && r.txDate <= pRange.e && r.b !== '미분류') {
           bMapPrev.set(r.b, (bMapPrev.get(r.b) || 0) + r.s);
        }
    }));
    
    // 정렬: 당해 매출 기준 (전년만 있는 브랜드는 전년 매출로), 같으면 이름순
    const sortedBrands = [...brands].sort((a,b) => {
        const aCur = bMapCur.get(a) || 0;
        const bCur = bMapCur.get(b) || 0;
        const aPrev = bMapPrev.get(a) || 0;
        const bPrev = bMapPrev.get(b) || 0;
        
        // 당해 매출이 있으면 당해 기준, 없으면 전년 기준
        const aVal = aCur > 0 ? aCur : aPrev;
        const bVal = bCur > 0 ? bCur : bPrev;
        
        if(bVal !== aVal) return bVal - aVal;
        return a.localeCompare(b);
    });
    
    window.filterBrandList = (q) => { document.querySelectorAll('.brand-item').forEach(item => { item.style.display = (q && !String(item.textContent).toLowerCase().includes(String(q).toLowerCase())) ? 'none' : 'block'; }); };
    window.selectBrand = selectBrand; // Use main selectBrand function
    const listHtml = sortedBrands.map(b => `<div class="brand-item" style="padding:10px 12px;cursor:pointer;border-radius:6px;margin-bottom:4px;font-size:13px;font-weight:600;color:var(--text-main);transition:all 0.15s;" onmouseover="this.style.background='var(--bg-panel)';this.style.boxShadow='var(--shadow-sm)';" onmouseout="this.style.background='transparent';this.style.boxShadow='none';" onclick="selectBrand('${String(b).replace(/'/g, "\\'").replace(/"/g, '&quot;')}')">${b}</div>`).join('');
    
    content.innerHTML=`<div class="card" style="padding:16px 20px;"><div class="sec-title" style="color:var(--primary);">🔍 브랜드별 심층 분석</div><div style="display:grid;grid-template-columns:260px 1fr;gap:20px"><div style="max-height:650px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;background:var(--bg-hover);box-shadow:inset 0 2px 4px rgba(0,0,0,0.02);"><input type="text" id="brandSearchInput" placeholder="브랜드명 검색..." style="width:100%;padding:10px 14px;margin-bottom:12px;border:1px solid var(--border-strong);border-radius:var(--radius-md);font-size:13px;font-family:inherit;outline:none;transition:border-color 0.2s;" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border-strong)'" oninput="filterBrandList(this.value)"><div id="brandListArea">${listHtml}</div></div><div id="brandDetail" style="padding:0;background:transparent;border-radius:var(--radius-lg);min-height:400px"><div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:14px;font-weight:500;border:2px dashed var(--border);border-radius:var(--radius-lg);background:var(--bg-panel);">← 좌측에서 분석할 브랜드를 선택하세요</div></div></div></div>`;
  }
  
  if(state.tab==='summary') drawChart(cY, pY, isCompare);
}

function drawChart(cArr, pArr, isCompare=false) {
  const ctx=document.getElementById('dailyChart'); if(!ctx)return;
  if(chartInst)chartInst.destroy();
  let rawLabels = new Set();
  cArr.forEach(r => { if(r.txDate) rawLabels.add(String(r.txDate).substring(4, 8)); });
  pArr.forEach(r => { if(r.txDate) rawLabels.add(String(r.txDate).substring(4, 8)); });
  const sortedMD = Array.from(rawLabels).sort();
  const labels = sortedMD.map(md => `${parseInt(String(md).substring(0,2))}/${parseInt(String(md).substring(2,4))}`);
  const mdToIndex = {}; labels.forEach((l, i) => mdToIndex[l] = i);

  let datasets = [];
  if (isCompare) {
    const colors = ['#ea580c', '#0284c7', '#16a34a', '#9333ea', '#ca8a04', '#dc2626', '#4f46e5', '#0d9488', '#be185d', '#0f766e'];
    state.selStores.forEach((storeName, idx) => {
      const dataArr = new Array(labels.length).fill(0);
      cArr.forEach(r => { 
        if(r.finalN === storeName && r.txDate) {
           const labelKey = `${parseInt(String(r.txDate).substring(4,6))}/${parseInt(String(r.txDate).substring(6,8))}`;
           dataArr[mdToIndex[labelKey]] += r.s; 
        }
      });
      datasets.push({ label: storeName, data: dataArr, borderColor: colors[idx % colors.length], backgroundColor: 'transparent', fill: false, tension: 0.4, pointRadius: 2, pointHoverRadius: 6, borderWidth: 2 });
    });
  } else {
    const cData = new Array(labels.length).fill(0), pData = new Array(labels.length).fill(0);
    cArr.forEach(r=>{ 
       if(r.txDate) {
          const labelKey = `${parseInt(String(r.txDate).substring(4,6))}/${parseInt(String(r.txDate).substring(6,8))}`;
          cData[mdToIndex[labelKey]] += r.s; 
       }
    });
    pArr.forEach(r=>{ 
       if(r.txDate) {
          const labelKey = `${parseInt(String(r.txDate).substring(4,6))}/${parseInt(String(r.txDate).substring(6,8))}`;
          pData[mdToIndex[labelKey]] += r.s; 
       }
    });
    datasets = [
      {label:'당해 누계',data:cData,borderColor:'#4f46e5',backgroundColor:'rgba(79, 70, 229, 0.05)',fill:true,tension:0.4,pointRadius:0,pointHoverRadius:6,borderWidth:2.5},
      {label:'전년 동기',data:pData,borderColor:'#94a3b8',borderDash:[5,4],fill:false,tension:0.4,pointRadius:0,pointHoverRadius:6,borderWidth:2}
    ];
  }

  chartInst=new Chart(ctx,{
    type:'line', data: { labels, datasets },
    options:{
      responsive:true,maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{position:'top', labels:{usePointStyle:true, padding:20, font:{family:'Pretendard', size:12, weight:'600'}}},
        tooltip:{ backgroundColor:'rgba(15, 23, 42, 0.9)', titleFont:{family:'Pretendard', size:13}, bodyFont:{family:'Pretendard', size:13}, padding:12, cornerRadius:8, callbacks:{label:c=>' ' + c.dataset.label+': '+c.raw.toLocaleString()+'원'} }
      },
      scales:{
        y:{beginAtZero:true, grid:{color:'#e2e8f0', drawBorder:false}, border:{display:false}, ticks:{font:{family:'Pretendard', size:11}, color:'#64748b', padding:10, callback:v=>{if(v>=100000000) return (v/100000000).toFixed(1)+'억';if(v>=1000000) return (v/1000000).toFixed(0)+'M';return v.toLocaleString();}}},
        x:{grid:{display:false, drawBorder:false}, border:{display:false}, ticks:{font:{family:'Pretendard', size:11}, color:'#64748b', padding:10, maxTicksLimit:15, maxRotation:0}}
      }
    }
  });
}
window.onload = () => { 
  // 페이지 로드 시 자동 초기화하지 않음 - 사용자가 초기화 버튼을 눌렀을 때만 메시지 표시
  renderRegionNav(); 
};
</script>
</body>
