<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리틀그라운드 통합 MD 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 사용자님의 v_27.html 원본 스타일 그대로 유지 */
        :root { --bg-color: #0d0d0d; --card-bg: #1a1a1a; --text-color: #e0e0e0; --accent-color: #00e676; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; }
        .dashboard-container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .upload-btn { background: var(--accent-color); color: #000; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid #333; text-align: right; }
        th { color: #888; font-weight: 500; text-align: center; }
        .brand-col { text-align: left; color: var(--accent-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header">
        <h1>LITTLEGROUND <span style="font-size: 0.5em; color: #888;">통합 MD 대시보드</span></h1>
        <label for="file-upload" class="upload-btn">엑셀 업로드 (DB 동기화)</label>
        <input type="file" id="file-upload" hidden accept=".xlsx, .xls">
    </div>

    <div class="chart-grid">
        <div class="card"><canvas id="brandChart"></canvas></div>
        <div class="card"><canvas id="storeChart"></canvas></div>
    </div>

    <div class="card">
        <table id="sales-table">
            <thead>
                <tr>
                    <th>브랜드</th>
                    <th>매장</th>
                    <th>실적 (원본 금액)</th>
                    <th>날짜</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    let bChart = null;
    let sChart = null;

    // [중요] 1. 페이지 로드 시 DB에서 데이터 즉시 호출
    window.onload = async () => {
        const res = await fetch('/api/data');
        const data = await res.json();
        if (data && data.length > 0) {
            renderDashboard(data);
        }
    };

    // [중요] 2. 엑셀 업로드 시 DB에 원본 그대로 저장
    document.getElementById('file-upload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = async (event) => {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(sheet);

            // 사용자님이 원하는 브랜드/금액/매장/날짜 매핑 (절사 절대 없음)
            const formatted = jsonData.map(row => ({
                brand: row['브랜드'] || row['brand'],
                store: row['매장'] || row['store'],
                amount: Number(row['금액'] || row['amount']), // 1원 단위 원본 보존
                date: row['날짜'] || row['date']
            }));

            const saveRes = await fetch('/api/data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: formatted })
            });

            if (saveRes.ok) {
                alert("서버 동기화 완료! 이제 링크를 공유하세요.");
                location.reload();
            }
        };
        reader.readAsArrayBuffer(file);
    });

    // 3. 기존 대시보드 렌더링 로직 (v_27.html 유지)
    function renderDashboard(data) {
        const tbody = document.querySelector('#sales-table tbody');
        tbody.innerHTML = '';
        
        const brandData = {};
        const storeData = {};

        data.forEach(item => {
            // 테이블 출력
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="brand-col">${item.brand_name}</td>
                <td style="text-align:center">${item.store_name}</td>
                <td>${item.amount.toLocaleString()}원</td>
                <td style="text-align:center">${item.sale_date}</td>
            `;
            tbody.appendChild(tr);

            // 차트 데이터 가공
            brandData[item.brand_name] = (brandData[item.brand_name] || 0) + item.amount;
            storeData[item.store_name] = (storeData[item.store_name] || 0) + item.amount;
        });

        drawCharts(brandData, storeData);
    }

    function drawCharts(bData, sData) {
        const commonOptions = {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { grid: { color: '#333' }, ticks: { color: '#888' } }, x: { ticks: { color: '#888' } } }
        };

        if(bChart) bChart.destroy();
        bChart = new Chart(document.getElementById('brandChart'), {
            type: 'bar',
            data: {
                labels: Object.keys(bData),
                datasets: [{ label: '브랜드 실적', data: Object.values(bData), backgroundColor: '#00e676' }]
            },
            options: commonOptions
        });

        if(sChart) sChart.destroy();
        sChart = new Chart(document.getElementById('storeChart'), {
            type: 'line',
            data: {
                labels: Object.keys(sData),
                datasets: [{ label: '매장 실적', data: Object.values(sData), borderColor: '#00e676', tension: 0.4 }]
            },
            options: commonOptions
        });
    }
</script>

</body>
</html>
