<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브랜드별 실적 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f8f9fa; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .upload-section { border: 2px dashed #dee2e6; padding: 40px; text-align: center; margin-bottom: 30px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: right; }
        th { background-color: #f1f3f5; text-align: center; }
        .brand-name { text-align: left; font-weight: bold; }
        #chart-container { margin-bottom: 40px; height: 400px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 실적 대시보드 (원본 데이터 모드)</h2>
    
    <div class="upload-section">
        <p>엑셀 파일을 업로드하면 서버에 자동 저장되고 링크 공유가 가능해집니다.</p>
        <input type="file" id="excelInput" accept=".xlsx, .xls" />
    </div>

    <div id="chart-container">
        <canvas id="salesChart"></canvas>
    </div>

    <table id="salesTable">
        <thead>
            <tr>
                <th>브랜드</th>
                <th>매장</th>
                <th>날짜</th>
                <th>금액 (1원 단위 원본)</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    let myChart = null;

    // 1. 페이지 로드 시 서버에서 데이터 가져오기
    window.onload = async () => {
        await loadDataFromServer();
    };

    // 2. 엑셀 파일 업로드 이벤트
    document.getElementById('excelInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (event) => {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(sheet);

            // [핵심] 엑셀 컬럼명이 '브랜드', '매장', '금액', '날짜' 기준 (영문 brand, store, amount, date도 허용)
            const formattedData = jsonData.map(row => ({
                brand: row['브랜드'] || row['brand'] || '미분류',
                store: row['매장'] || row['store'] || '미분류',
                amount: Number(row['금액'] || row['amount'] || 0), // 절사 없음
                date: row['날짜'] || row['date'] || '-'
            }));

            await saveDataToServer(formattedData);
        };
        reader.readAsArrayBuffer(file);
    });

    // 3. 서버(Supabase API)에 저장
    async function saveDataToServer(items) {
        try {
            const res = await fetch('/api/data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items })
            });
            if (res.ok) {
                alert("서버 저장 완료! 이제 이 주소를 공유하면 됩니다.");
                location.reload();
            } else {
                alert("저장 실패. Supabase RLS 설정을 확인하세요.");
            }
        } catch (err) {
            console.error("Error:", err);
        }
    }

    // 4. 서버에서 데이터 불러와서 화면 그리기
    async function loadDataFromServer() {
        try {
            const res = await fetch('/api/data');
            const data = await res.json();
            if (data && data.length > 0) {
                renderUI(data);
            }
        } catch (err) {
            console.error("Load Error:", err);
        }
    }

    // 5. 화면 렌더링 (차트 및 테이블)
    function renderUI(data) {
        const tbody = document.querySelector('#salesTable tbody');
        tbody.innerHTML = '';

        // 테이블 채우기 (절사 없이 콤마만 찍음)
        data.forEach(item => {
            const row = `<tr>
                <td class="brand-name">${item.brand_name}</td>
                <td>${item.store_name}</td>
                <td style="text-align:center">${item.sale_date}</td>
                <td>${item.amount.toLocaleString()}원</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        // 차트 그리기 (브랜드별 합계)
        const brandTotals = data.reduce((acc, curr) => {
            acc[curr.brand_name] = (acc[curr.brand_name] || 0) + curr.amount;
            return acc;
        }, {});

        const ctx = document.getElementById('salesChart').getContext('2d');
        if (myChart) myChart.destroy();
        
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(brandTotals),
                datasets: [{
                    label: '브랜드별 총 매출 (1원 단위)',
                    data: Object.values(brandTotals),
                    backgroundColor: ['#4dabf7', '#ff922b', '#51cf66', '#f06595']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true } }
            }
        });
    }
</script>

</body>
</html>
